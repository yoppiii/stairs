<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#102a43" />
    <title>부기의 계단</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud-top">
        <h1>부기의 계단</h1>
      </header>

      <section class="game-wrap">
        <canvas id="game" width="900" height="1600" aria-label="부기의 계단 게임 화면"></canvas>
        <div class="score-float" aria-live="polite">점수 <strong id="score">0</strong></div>
        <span class="best-hidden">최고 <strong id="best">0</strong></span>
        <div class="touch-zones" aria-hidden="true">
          <span class="zone left">왼쪽 터치</span>
          <span class="zone right">오른쪽 터치</span>
        </div>

        <div id="overlay" class="overlay visible">
          <h2 id="overlay-title">부기의 계단</h2>
          <div class="menu-character-wrap" aria-hidden="true">
            <img class="menu-character-img" src="./assets/menu-character.png" alt="메뉴 캐릭터" />
          </div>
          <p id="overlay-text">왼쪽/오른쪽 터치로 계단을 올라가세요</p>
          <button id="start-btn" type="button">무한모드</button>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
